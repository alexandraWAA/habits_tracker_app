name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - master
      - develop
      - 'feature/*'
      - 'branch*'
      - branch35
  pull_request:
    branches:
      - main
      - master
      - branch35
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade setuptools wheel
          pip install black isort flake8

      - name: Run black check
        run: |
          black --check --verbose --diff . --target-version=py311

      - name: Run isort check
        run: |
          isort --check-only --diff . --profile black

      - name: Run flake8
        run: |
          flake8 . --exclude=.venv,venv,env,__pycache__,migrations,.git --count --max-complexity=10 --max-line-length=127 --statistics

  test:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      max-parallel: 4
      matrix:
        python-version: ["3.11"]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade setuptools wheel
          pip install -r requirements.txt
          pip install coverage

      - name: Run tests with coverage
        env:
          STRIPE_API_KEY: sk_test_placeholder
          STRIPE_WEBHOOK_SECRET: whsec_placeholder
          USE_SQLITE: True
        run: |
          python manage.py test
          coverage run manage.py test
          coverage report --fail-under=50

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t habits-tracker:latest -f Dockerfile.prod .

      - name: Test Docker image
        run: |
          docker run --rm --entrypoint python habits-tracker:latest -c "import django; print('Django OK')"

      - name: Login to Docker Hub
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker image
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        run: |
          docker tag habits-tracker:latest ${{ secrets.DOCKER_USERNAME }}/habits-tracker:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/habits-tracker:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build
    # Временно закомментировано для проверки
    # if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    environment:
      name: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Copy project files to server
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: "docker-compose.prod.yml,.env.prod"
          target: "/home/${{ secrets.SERVER_USER }}/habits-tracker/"
          overwrite: true

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            cd /home/${{ secrets.SERVER_USER }}/habits-tracker

            # Pull the latest image from Docker Hub
            docker pull ${{ secrets.DOCKER_USERNAME }}/habits-tracker:latest

            # Stop and remove old containers
            docker-compose -f docker-compose.prod.yml down || true

            # Start new containers
            docker-compose -f docker-compose.prod.yml up -d

            # Clean up unused Docker resources
            docker system prune -f

      - name: Verify deployment
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            sleep 10
            curl -f http://${{ secrets.SERVER_IP }}/api/docs/ || exit 1
            echo "✅ Deployment successful!"
