name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - master
      - develop
      - 'feature/*'
      - 'branch*'
      - branch35
  pull_request:
    branches:
      - main
      - master
      - branch35
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install black isort flake8

    - name: Run black check
      run: |
        black --check --verbose --diff . --target-version=py311

    - name: Run isort check
      run: |
        isort --check-only --diff . --profile black

    - name: Run flake8
      run: |
        flake8 . --exclude=.venv,venv,env,__pycache__,migrations,.git --count --max-complexity=10 --max-line-length=127 --statistics

  test:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      max-parallel: 4
      matrix:
        python-version: [ "3.11" ]

    services:
      postgres:
        image: postgres:14.6-alpine
        env:
          POSTGRES_DB: habits_db
          POSTGRES_USER: habits_user
          POSTGRES_PASSWORD: habits_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U habits_user -d habits_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade setuptools wheel
          pip install -r requirements.txt
          pip install coverage
          pip list

      - name: Debug database connection
        run: |
          python -c "import psycopg2; conn = psycopg2.connect(dbname='habits_db', user='habits_user', password='habits_password', host='localhost', port='5432'); print('DB connection OK')"

      - name: Run migrations
        run: |
          python manage.py makemigrations
          python manage.py migrate

      - name: Run tests
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: habits_db
          DB_USER: habits_user
          DB_PASSWORD: habits_password
          STRIPE_API_KEY: sk_test_placeholder
          STRIPE_WEBHOOK_SECRET: whsec_placeholder
        run: |
          python manage.py test -v 2
  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image
      run: |
        docker build -t habits-tracker:latest -f Dockerfile.prod .

    - name: Test Docker image
      run: |
        docker run --rm --entrypoint python habits-tracker:latest -c "import django; print('Django OK')"

    - name: Login to Docker Hub
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Push Docker image
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
      run: |
        docker tag habits-tracker:latest ${{ secrets.DOCKER_USERNAME }}/habits-tracker:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/habits-tracker:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    environment:
      name: production
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh/
        echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key
        echo "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts

    - name: Deploy to server
      env:
        SERVER_IP: ${{ secrets.SERVER_IP }}
        SERVER_USER: ${{ secrets.SERVER_USER }}
        DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      run: |
        ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no $SERVER_USER@$SERVER_IP << 'ENDSSH'
          cd /home/$SERVER_USER/habits-tracker || exit 1
          git pull origin main
          docker-compose -f docker-compose.prod.yml down
          docker-compose -f docker-compose.prod.yml pull
          docker-compose -f docker-compose.prod.yml up -d
          docker system prune -f
        ENDSSH

    - name: Verify deployment
      env:
        SERVER_IP: ${{ secrets.SERVER_IP }}
      run: |
        sleep 10
        curl -f http://$SERVER_IP/api/docs/ || exit 1
        echo "✅ Deployment successful!"
