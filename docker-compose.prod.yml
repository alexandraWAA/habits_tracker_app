version: '3.8'

services:
  db:
    image: postgres:14.6-alpine
    container_name: habits_db_prod
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-habits_db}
      POSTGRES_USER: ${DB_USER:-habits_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-habits_password}
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-habits_user}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - habits_network_prod
    env_file:
      - .env.prod

  redis:
    image: redis:7-alpine
    container_name: habits_redis_prod
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - redis_data_prod:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - habits_network_prod

  web:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: habits_web_prod
    restart: always
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4
    volumes:
      - static_volume_prod:/app/staticfiles
      - media_volume_prod:/app/media
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DEBUG=0
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ALLOWED_HOSTS=${SERVER_IP},${DOMAIN}
    networks:
      - habits_network_prod
    env_file:
      - .env.prod

  celery:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: habits_celery_prod
    restart: always
    command: celery -A config worker --loglevel=info
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    networks:
      - habits_network_prod
    env_file:
      - .env.prod

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: habits_celery_beat_prod
    restart: always
    command: celery -A config beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    networks:
      - habits_network_prod
    env_file:
      - .env.prod

  nginx:
    image: nginx:1.25-alpine
    container_name: habits_nginx_prod
    restart: always
    volumes:
      - static_volume_prod:/app/staticfiles
      - media_volume_prod:/app/media
      - ./nginx.prod.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - web
    networks:
      - habits_network_prod

networks:
  habits_network_prod:
    driver: bridge

volumes:
  postgres_data_prod:
    name: habits_postgres_data_prod
  redis_data_prod:
    name: habits_redis_data_prod
  static_volume_prod:
    name: habits_static_volume_prod
  media_volume_prod:
    name: habits_media_volume_prod
